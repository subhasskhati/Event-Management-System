<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to EventApp to manage bookings, view events, and access AI-powered audit features.">
    <title>Login - EventApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">EventApp</a>
            <ul id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="login.html" class="active">Login</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2>Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <p>Don't have an account? <a href="register.html">Register here</a></p>
            <p id="login-error" style="color: red;"></p>
        </div>
    </div>

    <footer class="page-footer">
        <div class="container footer-wrap">
            <p>&copy; 2026 EventApp. Secure login for access to events and analytics.</p>
            <p class="footer-note">Sign in to use the full event audit experience.</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
